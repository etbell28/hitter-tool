name: Automate Hitter Tool

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What should run?"
        required: true
        default: "remaining"
        type: choice
        options:
          - full
          - remaining
          - audit
  schedule:
    # GitHub cron uses UTC. These times are aimed at Eastern Time MLB workflow windows.
    # Overnight audit after the prior slate is complete.
    - cron: "30 10 * * *"
    # Morning / early afternoon full-slate builds.
    - cron: "30 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 15 * * *"
    - cron: "0 17 * * *"
    - cron: "0 19 * * *"
    # Lineup window and late-slate refreshes, every 30 minutes.
    - cron: "0,30 20-23 * * *"
    - cron: "0,30 0-2 * * *"

permissions:
  contents: write

jobs:
  automate-hitter-tool:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Choose task
        id: choose
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "task=${{ inputs.task }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          schedule="${{ github.event.schedule }}"
          if [ "$schedule" = "30 10 * * *" ]; then
            echo "task=audit" >> "$GITHUB_OUTPUT"
          elif [ "$schedule" = "30 12 * * *" ] || [ "$schedule" = "0 13 * * *" ] || [ "$schedule" = "0 15 * * *" ] || [ "$schedule" = "0 17 * * *" ] || [ "$schedule" = "0 19 * * *" ]; then
            echo "task=full" >> "$GITHUB_OUTPUT"
          else
            echo "task=remaining" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full slate
        if: steps.choose.outputs.task == 'full'
        run: python run_full_slate.py

      - name: Run remaining-games slate
        if: steps.choose.outputs.task == 'remaining'
        run: python run_remaining_slate.py

      - name: Run nightly audit
        if: steps.choose.outputs.task == 'audit'
        run: python scripts/audit_hr_results.py

      - name: Commit updated outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard_site/index.html outputs/daily outputs/hr_rankings.csv outputs/hr_rankings.md outputs/hr_rankings.xlsx outputs/auto_slate_full.csv outputs/auto_slate_late.csv outputs/auto_slate_remaining.csv || true
          git commit -m "Automated Hitter Tool update" || echo "No changes to commit"
          git push
