name: Live Hitter Tool Refresh

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Refresh mode"
        required: true
        default: "remaining"
        type: choice
        options:
          - full
          - remaining
  schedule:
    - cron: "*/15 12-19 * * *"
    - cron: "*/5 20-23 * * *"
    - cron: "*/5 0-3 * * *"

permissions:
  contents: write

jobs:
  refresh-live-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Choose refresh mode
        id: choose
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          schedule="${{ github.event.schedule }}"
          if [ "$schedule" = "*/15 12-19 * * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=remaining" >> "$GITHUB_OUTPUT"
          fi

      - name: Build live payload
        run: python run_live_refresh.py --mode "${{ steps.choose.outputs.mode }}"

      - name: Commit live data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/live_payload.json dashboard_site/data/slate.json outputs/hr_rankings.csv outputs/hr_rankings.md outputs/hr_rankings.xlsx outputs/auto_slate_full.csv outputs/auto_slate_remaining.csv outputs/active_slate.txt outputs/daily
          git commit -m "Update live Hitter Tool data" || echo "No live data changes to commit"
          git push
